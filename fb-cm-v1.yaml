apiVersion: v1
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info
        Parsers_File parsers.conf

    [INPUT]
        Name tail
        Path /var/log/*.log
        Tag node-app
        Refresh_Interval 5

    [OUTPUT]
        Name cloudwatch
        Match *
        region us-east-2
        log_group_name /eks/node-app-cb
        log_stream_prefix node-app-
        auto_create_group true
  parsers.conf: |
    [PARSER]
        Name   json
        Format json
        Time_Key timestamp
        Time_Format %Y-%m-%dT%H:%M:%S
immutable: false
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: default
